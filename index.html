<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE LOOP SKILLS</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800;900&family=Assistant:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --purple:#7c3aed;
    --purple-dark:#6429d4;
    --purple-soft:#f3eefe;
    --purple-border:#e4d8fb;
    --ink:#111;
    --gray:#555;
    --gray-soft:#777;
    --line:#ececec;
    --card-line:#eee;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:"Heebo","Assistant",-apple-system,"Segoe UI",Arial,sans-serif;
    background:#fff;color:var(--ink);line-height:1.65;
  }

  /* Top bar */
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 28px;border-bottom:1px solid var(--line);
    position:sticky;top:0;background:rgba(255,255,255,.9);backdrop-filter:blur(8px);z-index:50;
  }
  .topbar .email{color:var(--gray-soft);font-size:14px}
  .topbar .brand{font-weight:900;font-size:18px;letter-spacing:.5px;color:var(--ink)}
  .topbar .brand .spark{color:var(--purple)}
  .topbar .brand-logo{height:40px;width:auto;display:block}

  .wrap{max-width:1080px;margin:0 auto;padding:44px 24px 120px}

  /* Hero */
  .hero{text-align:center;margin-bottom:36px}
  .hero h1{
    font-size:52px;font-weight:900;letter-spacing:1px;line-height:1.05;
    direction:ltr;
  }
  .hero h1 .accent{color:var(--purple)}
  .hero .tag{color:var(--gray);font-size:19px;margin-top:14px;max-width:560px;margin-inline:auto}
  .hero .meta{margin-top:14px;color:var(--gray-soft);font-size:15px;font-weight:600}
  .hero .meta b{color:var(--purple)}

  /* Search */
  .search-row{display:flex;justify-content:center;margin:30px 0 22px}
  .search{
    position:relative;width:100%;max-width:520px;
  }
  .search input{
    width:100%;padding:15px 48px 15px 18px;font-size:16px;font-family:inherit;
    border:1px solid var(--purple-border);border-radius:14px;background:var(--purple-soft);
    color:var(--ink);outline:none;transition:border .15s,box-shadow .15s;
  }
  .search input::placeholder{color:#a89bc9}
  .search input:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(124,58,237,.12);background:#fff}
  .search .ic{position:absolute;right:16px;top:50%;transform:translateY(-50%);color:var(--purple);font-size:18px}

  /* Category chips */
  .chips{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:26px}
  .chip{
    display:inline-flex;align-items:center;gap:7px;
    padding:8px 16px;border-radius:999px;border:1px solid var(--purple-border);
    background:#fff;color:var(--gray);font-size:14px;font-weight:700;cursor:pointer;
    transition:all .14s;font-family:inherit;
  }
  .chip:hover{border-color:var(--purple);color:var(--purple)}
  .chip.active{background:var(--purple);border-color:var(--purple);color:#fff}
  .chip .c-count{font-size:12px;opacity:.7}

  /* Install-all banner */
  .banner{
    display:flex;align-items:center;justify-content:space-between;gap:18px;
    background:var(--purple-soft);border:1px solid var(--purple-border);
    border-radius:16px;padding:18px 22px;margin-bottom:34px;flex-wrap:wrap;
  }
  .banner .b-txt{font-size:15px;color:#3a3a3a}
  .banner .b-txt b{color:var(--purple)}
  .banner .b-icon{font-size:22px}

  /* Grid */
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
  @media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:600px){.grid{grid-template-columns:1fr}}

  .card{
    border:1px solid var(--card-line);border-radius:18px;padding:22px 22px 20px;
    background:#fff;display:flex;flex-direction:column;
    transition:transform .15s,box-shadow .15s,border-color .15s;
  }
  .card:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(124,58,237,.10);border-color:var(--purple-border)}
  .card .c-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px}
  .card .c-title{font-size:19px;font-weight:800;color:#000}
  .card .c-emoji{font-size:26px;line-height:1;flex:0 0 auto}
  .card .c-cat{
    display:inline-block;font-size:12px;font-weight:700;color:var(--purple);
    background:var(--purple-soft);padding:3px 10px;border-radius:999px;margin-bottom:12px;align-self:flex-start;
  }
  .card .c-desc{font-size:15px;color:#444;flex:1 1 auto;margin-bottom:16px}
  .card .c-actions{display:flex;gap:8px;align-items:stretch}
  .btn-copy{
    flex:1 1 auto;display:inline-flex;align-items:center;justify-content:center;gap:8px;
    background:var(--purple);color:#fff;border:none;border-radius:11px;
    padding:12px 14px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;
    transition:background .14s,transform .14s;
  }
  .btn-copy:hover{background:var(--purple-dark);transform:translateY(-1px)}
  .btn-copy.done{background:#16a34a}
  .btn-ghost{
    flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;
    width:46px;border:1px solid var(--purple-border);border-radius:11px;
    background:#fff;color:var(--purple);text-decoration:none;font-size:17px;transition:all .14s;
  }
  .btn-ghost:hover{background:var(--purple-soft);border-color:var(--purple)}

  .empty{text-align:center;color:var(--gray-soft);padding:60px 0;font-size:17px;display:none}

  /* Toast */
  .toast{
    position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);
    background:#111;color:#fff;padding:13px 22px;border-radius:12px;font-weight:700;font-size:15px;
    opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:100;
    box-shadow:0 8px 30px rgba(0,0,0,.25);
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  footer{text-align:center;color:var(--gray-soft);font-size:14px;margin-top:60px;padding-top:24px;border-top:1px solid var(--line)}
  footer b{color:var(--purple)}
</style>
</head>
<body>

<div class="topbar">
  <span class="email">shira@somethingstudio.co.il</span>
  <img class="brand-logo" src="https://shira-smtng.github.io/the-loop-skills/loop-logo.png" alt="LOOP">
</div>

<div class="wrap">

  <div class="hero">
    <h1>THE LOOP <span class="accent">SKILLS</span></h1>
    <p class="tag">כל הכלים של קלודתון מוכנים להעתק והדבק לתוך הקלוד שלך</p>
    <p class="meta"><b id="skill-count">24</b> סקילים &nbsp;·&nbsp; <b id="cat-count">8</b> קטגוריות</p>
  </div>

  <div class="search-row">
    <div class="search">
      <span class="ic">⌕</span>
      <input id="search" type="text" placeholder="חיפוש סקיל..." autocomplete="off">
    </div>
  </div>

  <div class="chips" id="chips"></div>

  <div class="banner">
    <span class="b-txt"><b>רוצה הכל בבת אחת?</b> &nbsp;התקיני את כל ה-24 סקילים בפקודה אחת.</span>
    <button class="btn-copy" style="flex:0 0 auto" onclick="copyAll(this)"><span>⬇︎</span> העתק התקנת הכל</button>
  </div>

  <div class="grid" id="grid"></div>
  <div class="empty" id="empty">לא נמצא סקיל שמתאים לחיפוש 🔍</div>

  <footer>באהבה, <b>שירה ודידי</b> &nbsp;·&nbsp; THE LOOP SKILLS</footer>

</div>

<div class="toast" id="toast">✓ הפקודה הועתקה! הדביקי בקלוד קוד</div>

<script>
const REPO = "shira-smtng/the-loop-skills";
const BASE = "https://github.com/" + REPO;

function installCmd(name){
  return `curl -sL ${BASE}/archive/main.tar.gz | tar -xz -C /tmp && cp -r /tmp/the-loop-skills-main/skills/${name} ~/.claude/skills/ && rm -rf /tmp/the-loop-skills-main`;
}
function installAllCmd(){
  return `curl -sL ${BASE}/archive/main.tar.gz | tar -xz -C /tmp && cp -r /tmp/the-loop-skills-main/skills/* ~/.claude/skills/ && rm -rf /tmp/the-loop-skills-main`;
}

const CATS = {
  writing:  {label:"כתיבה ותוכן",    emoji:"✍️"},
  landing:  {label:"דפי נחיתה",      emoji:"🎯"},
  marketing:{label:"שיווק ופרסום",   emoji:"📣"},
  design:   {label:"עיצוב",          emoji:"🎨"},
  club:     {label:"מועדון THE LOOP", emoji:"💜"},
  hebrew:   {label:"עברית וקלוד",     emoji:"🇮🇱"},
  video:    {label:"וידאו",          emoji:"🎬"},
  docs:     {label:"מסמכים וקבצים",   emoji:"📊"},
};

const SKILLS = [
  {name:"ad-copywriter",       cat:"writing", emoji:"📱", title:"כתיבת מודעות", desc:"כותב לך מודעות לפייסבוק ואינסטגרם בעברית, בטון שמדבר ישר ללקוחות שלך."},
  {name:"copywriting",         cat:"writing", emoji:"✏️", title:"קופי לדפים", desc:"כותב ומשפר קופי שיווקי לכל עמוד: דף בית, דף מכירה, עמוד תמחור."},
  {name:"copy-editing",        cat:"writing", emoji:"🔎", title:"עריכת קופי", desc:"לוקח טקסט שכתבת ומלטש אותו במעברים ממוקדים עד שהוא חד ומשכנע."},
  {name:"email-copywriting",   cat:"writing", emoji:"📧", title:"מיילים שיווקיים", desc:"כותב מיילים שנפתחים ונקראים, לפי נוסחת 8 חלקים מוכחת."},

  {name:"landing-page-mamira", cat:"landing", emoji:"🚀", title:"דף נחיתה בעברית", desc:"בונה דף נחיתה עברי שלם וחי, מהקופי ועד העיצוב, קובץ מוכן לפתיחה."},
  {name:"landing-page-design", cat:"landing", emoji:"📐", title:"עקרונות דף ממיר", desc:"כללי עיצוב ופסיכולוגיה של דפים שממירים: כותרת, כפתור, הוכחה חברתית."},

  {name:"marketing-ideas",     cat:"marketing", emoji:"💡", title:"רעיונות שיווק", desc:"139 רעיונות וטקטיקות שיווק מוכחים, לפי קטגוריות, כשנגמרת לך ההשראה."},
  {name:"marketing-psychology",cat:"marketing", emoji:"🧠", title:"פסיכולוגיה שיווקית", desc:"מודלים שמסבירים למה אנשים קונים, ואיך ליישם את זה בתוכן שלך."},
  {name:"page-cro",            cat:"marketing", emoji:"📈", title:"שיפור המרות", desc:"בודק למה עמוד לא ממיר ונותן המלצות קונקרטיות מה לשנות."},
  {name:"popup-cro",          cat:"marketing", emoji:"🪧", title:"פופאפים ובאנרים", desc:"בונה ומשפר פופאפים וחלונות לכידת לידים שבאמת עובדים."},
  {name:"seo-audit",          cat:"marketing", emoji:"🔍", title:"בדיקת SEO", desc:"בודק למה האתר שלך לא מופיע בגוגל, ומה בדיוק לתקן."},

  {name:"canvas-design",       cat:"design", emoji:"🖼️", title:"עיצוב פוסטרים", desc:"מעצב פוסטרים, תמונות ואמנות ויזואלית בקובץ PNG או PDF."},
  {name:"design-strategist",   cat:"design", emoji:"🎨", title:"אסטרטגיית עיצוב", desc:"בוחר לך סגנון, פלטת צבעים וכיוון ויזואלי שמתאים למוצר ולקהל."},
  {name:"club-schedule-design",cat:"design", emoji:"📅", title:"עיצוב לוז", desc:"מייצר תמונת לוח זמנים חודשי מעוצבת לוואטסאפ ולאינסטגרם."},

  {name:"club-claude-guide",   cat:"club", emoji:"💜", title:"מדריך קלוד", desc:"מסבירה לך איך לבקש מקלוד נכון ולהוציא תוצאות טובות יותר לעסק."},

  {name:"hebrew-memory",       cat:"hebrew", emoji:"🧷", title:"זיכרון עברית", desc:"מקשר מילים בעברית לסקילים הנכונים. מפעילה פעם אחת, וקלוד זוכר."},
  {name:"install-rtl-extension",cat:"hebrew", emoji:"↔️", title:"תוסף RTL", desc:"מתקין תצוגה מימין לשמאל לקלוד קוד, שהעברית תיראה נכון."},
  {name:"brainstorming",       cat:"hebrew", emoji:"🌀", title:"סיעור מוחות", desc:"עוזר לחדד רעיון לפני שמתחילים, ושואל את השאלות הנכונות."},
  {name:"idea-refine",         cat:"hebrew", emoji:"✨", title:"ליטוש רעיונות", desc:"לוקח רעיון גולמי ומזקק אותו לכיוון ברור וממוקד."},

  {name:"install-silence-cutter",cat:"video", emoji:"🎬", title:"חותך שקט", desc:"מתקין תוסף לפרמייר שחותך שקטים אוטומטית מתוך הקלטות."},

  {name:"docx", cat:"docs", emoji:"📄", title:"מסמכי Word", desc:"יוצר ועורך מסמכי Word מקצועיים: דוחות, מכתבים, תבניות."},
  {name:"pdf",  cat:"docs", emoji:"📕", title:"קבצי PDF", desc:"ממזג, חותך, ממלא טפסים ומחלץ טקסט מתוך קבצי PDF."},
  {name:"pptx", cat:"docs", emoji:"📊", title:"מצגות", desc:"בונה ועורך מצגות, פיץ' דקים ומצגות מכירה."},
  {name:"xlsx", cat:"docs", emoji:"📗", title:"גיליונות אקסל", desc:"יוצר ומסדר גיליונות, נוסחאות, גרפים וניקוי נתונים."},
];

let activeCat = "all";
let query = "";

const grid = document.getElementById("grid");
const chipsEl = document.getElementById("chips");
const emptyEl = document.getElementById("empty");

document.getElementById("skill-count").textContent = SKILLS.length;
document.getElementById("cat-count").textContent = Object.keys(CATS).length;

// chips
function buildChips(){
  const counts = {};
  SKILLS.forEach(s => counts[s.cat] = (counts[s.cat]||0)+1);
  let html = `<button class="chip active" data-cat="all">הכל <span class="c-count">${SKILLS.length}</span></button>`;
  for(const [key,c] of Object.entries(CATS)){
    if(!counts[key]) continue;
    html += `<button class="chip" data-cat="${key}">${c.emoji} ${c.label} <span class="c-count">${counts[key]}</span></button>`;
  }
  chipsEl.innerHTML = html;
  chipsEl.querySelectorAll(".chip").forEach(ch=>{
    ch.onclick = ()=>{
      activeCat = ch.dataset.cat;
      chipsEl.querySelectorAll(".chip").forEach(x=>x.classList.remove("active"));
      ch.classList.add("active");
      render();
    };
  });
}

function render(){
  const q = query.trim().toLowerCase();
  const list = SKILLS.filter(s=>{
    const catOk = activeCat==="all" || s.cat===activeCat;
    const qOk = !q || (s.title+" "+s.desc+" "+s.name).toLowerCase().includes(q);
    return catOk && qOk;
  });
  grid.innerHTML = list.map(s=>`
    <div class="card">
      <div class="c-top">
        <span class="c-title">${s.title}</span>
        <span class="c-emoji">${s.emoji}</span>
      </div>
      <span class="c-cat">${CATS[s.cat].emoji} ${CATS[s.cat].label}</span>
      <p class="c-desc">${s.desc}</p>
      <div class="c-actions">
        <button class="btn-copy" onclick="copySkill('${s.name}',this)"><span>⧉</span> העתק התקנה</button>
        <a class="btn-ghost" href="${BASE}/tree/main/skills/${s.name}" target="_blank" rel="noopener" title="צפייה בסקיל ב-GitHub">↗</a>
      </div>
    </div>
  `).join("");
  emptyEl.style.display = list.length ? "none" : "block";
}

function doCopy(text){
  if(navigator.clipboard && navigator.clipboard.writeText){
    return navigator.clipboard.writeText(text);
  }
  const ta=document.createElement("textarea");
  ta.value=text;ta.style.position="fixed";ta.style.opacity="0";
  document.body.appendChild(ta);ta.select();
  try{document.execCommand("copy")}catch(e){}
  document.body.removeChild(ta);
  return Promise.resolve();
}

function flashBtn(btn,label){
  const orig = btn.innerHTML;
  btn.classList.add("done");
  btn.innerHTML = "<span>✓</span> "+label;
  setTimeout(()=>{btn.classList.remove("done");btn.innerHTML=orig;},1800);
}
let toastTimer;
function toast(){
  const t=document.getElementById("toast");
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove("show"),2200);
}

function copySkill(name,btn){ doCopy(installCmd(name)).then(()=>{flashBtn(btn,"הועתק");toast();}); }
function copyAll(btn){ doCopy(installAllCmd()).then(()=>{flashBtn(btn,"הועתק");toast();}); }

document.getElementById("search").addEventListener("input",e=>{query=e.target.value;render();});

buildChips();
render();
</script>
</body>
</html>
